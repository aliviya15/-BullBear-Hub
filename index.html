<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>BullBear Hub</title>

  <meta
    name="description"
    content="BullBear Hub - Futuristic Market Intelligence Platform"
  />

  <meta name="theme-color" content="#000000" />

 
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Inter:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #050816;
      color: white;
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
    }

    * {
      box-sizing: border-box;
    }

    #root {
      min-height: 100vh;
    }

    
    body::before {
      content: "";
      position: fixed;
      width: 500px;
      height: 500px;
      background: rgba(0, 255, 150, 0.08);
      filter: blur(120px);
      top: -100px;
      left: -100px;
      z-index: -1;
    }

    body::after {
      content: "";
      position: fixed;
      width: 500px;
      height: 500px;
      background: rgba(255, 0, 80, 0.08);
      filter: blur(120px);
      bottom: -100px;
      right: -100px;
      z-index: -1;
    }
  </style>
</head>

<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>

  <div id="root"></div>
</body>
</html>
